<!DOCTYPE html>

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        /* 字体（フォント）の指定を追加 */
        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            color: #333;
        }

        h2 {
            font-family: 'Zen Old Mincho', serif;
            text-align: center;
            margin: 40px 0;
        }

        nav a {
            font-family: 'Zen Old Mincho', serif;
            text-decoration: none;
            color: #666;
            padding: 20px;
            display: inline-block;
        }

        /* ギャラリーのスタイル（桜ギャラリーと統一） */
        .gallery-item img {
            width: 100%;
            max-width: 600px;
            height: auto;
            display: block;
            margin: 20px auto;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
