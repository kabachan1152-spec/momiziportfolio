<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Momizi Gallery</title>
    <style>
        /* 桜ギャラリーと同じスタイル */
        .gallery-item img {
            width: 100%;       /* 横幅を親要素（枠）に合わせる */
            max-width: 600px;  /* 写真が大きくなりすぎないよう上限を決める */
            height: auto;      /* 縦横比を維持 */
            display: block;
            margin: 20px auto; /* 写真を中央に寄せ、上下に余白 */
        }

        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        nav { padding: 10px; }
    </style>
</head>
