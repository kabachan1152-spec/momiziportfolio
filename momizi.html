<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momizi Gallery | Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            line-height: 1.8;
            background-color: #ffffff;
            color: #333;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #eee;
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: #666;
            font-weight: bold;
            font-family: 'Zen Old Mincho', serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            transition: 0.3s;
        }

        nav a:hover { color: #000; }

        h2 {
            font-family: 'Zen Old Mincho', serif;
            text-align: center;
            margin: 60px 0 40px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-size: 2rem;
        }

        /* ギャラリー：横並び（グリッド）設定 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 20px 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative; /* タイトルを重ねる基準 */
            aspect-ratio: 1 / 1; /* 正方形に統一 */
            overflow: hidden;
            background: #f9f9f9;
            border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: 0.5s;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* 画像の上のタイトルラベル */
        .gallery-item p {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 2;
            margin: 0;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            font-family: 'Zen Old Mincho', serif;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        @media (max-width: 600px) {
            .gallery { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">← BACK TO TOP</a>
