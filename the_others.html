<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Others Gallery | Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            line-height: 1.8;
            background-color: #ffffff;
            color: #333;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #eee;
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #666;
            font-weight: bold;
            font-family: 'Zen Old Mincho', serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        section {
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        h2 {
            font-family: 'Zen Old Mincho', serif;
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gallery-item {
            width: 100%;
            max-width: 600px;
            margin-bottom: 60px;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: 0.5s;
        }

        .gallery-item:hover img {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
