<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ichinose Momizi</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        /* --- 基本スタイル --- */
        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            line-height: 1.8;
            background-color: #ffffff;
            color: #333;
            scroll-behavior: smooth;
        }

        /* --- ナビゲーション --- */
        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #eee;
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #666;
            font-weight: bold;
            font-family: 'Zen Old Mincho', serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

    /* --- 1. ヒーローセクション（スマホ対応パララックス） --- */
.hero-section {
    position: relative;
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    z-index: 1;
}

/* スマホでも背景を固定するための擬似要素 */
.hero-section::before {
    content: "";
    position: fixed; /* 画面全体に固定 */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('images/DSC_614.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: -1; /* テキストの背面に配置 */
}

/* --- 2. ヒーローテキスト（元のデザインを復元） --- */
.hero-text {
    color: white;
    text-align: left; /* 左寄せに戻しました */
    width: 80%;
    max-width: 1000px;
    font-family: 'Zen Old Mincho', serif; /* 元のフォントを指定 */
}

.hero-text p {
    font-size: 1rem;
    letter-spacing: 0.2em;
    margin: 0;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
}

.hero-text h1 {
    font-size: clamp(2rem, 8vw, 4rem);
    letter-spacing: 0.1em;
    margin: 10px 0 0;
    text-shadow: 0 2px 15px rgba(0, 0, 0, 0.4);
    text-transform: uppercase;
}

/* --- ナビゲーションバー：さらに凝縮版 --- */
nav {
    display: flex;
    justify-content: center; 
    align-items: center;
    width: 100%;
    max-width: 100vw;
    padding: 12px 0;
    box-sizing: border-box;
    /* 隙間をさらに詰めました（PCでは15px、スマホでは自動縮小） */
    gap: clamp(8px, 2.5vw, 15px); 
}

nav a {
    text-decoration: none;
    color: #666;
    white-space: nowrap;
    /* 文字サイズをもう一段階小さく設定 (11px〜14pxの間で動く) */
    font-size: clamp(11px, 2.8vw, 14px); 
    letter-spacing: 0.01em; /* 字間を最小限に */
    font-family: 'Zen Old Mincho', serif;
}

/* SNSエリア */
.sns-area {
    display: flex;
    align-items: center;
    /* アイコンとCONTACTの距離をギュッと詰める */
    gap: 6px; 
    margin-left: 2px;
    padding-left: 8px;
    border-left: 1px solid rgba(0,0,0,0.1);
    flex-shrink: 0;
}

.sns-area img, 
.sns-area svg {
    /* アイコンも18pxに固定して横幅を節約 */
    width: 18px;
    height: 18px;
}

/* 非常に幅の狭いスマホ（iPhone SEなど）への最終対策 */
@media (max-width: 350px) {
    nav {
        gap: 5px; /* 隙間を限界まで詰める */
    }
    nav a {
        font-size: 10px !important; /* 最小サイズ */
    }
}
        .content-wrapper {
            position: relative;
            z-index: 10;
            background-color: #ffffff;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }

        section {
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 {
            font-family: 'Zen Old Mincho', serif;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        /* --- ギャラリー --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #f9f9f9;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
            display: block;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item p {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 2;
            margin: 0;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            font-family: 'Zen Old Mincho', serif;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            pointer-events: none;
        }

        /* --- プロフィール --- */
        .profile-container {
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            background: #fafafa;
            padding: 40px;
            border-radius: 4px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            background: #eee;
        }

        .profile-text h3 {
            font-family: 'Zen Old Mincho', serif;
            margin-top: 0;
        }

        /* --- お問い合わせフォーム（枠線追加） --- */
        .contact-wrapper {
            max-width: 600px;
            margin: 0 auto;
            text-align: left;
            border: 1px solid #333; /* 細い黒色の枠線を追加 */
            padding: 50px 40px;      /* 枠内の余白 */
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-family: 'Zen Old Mincho', serif;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #666;
        }

        .contact-wrapper input,
        .contact-wrapper textarea {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid #ccc;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 1rem;
            outline: none;
            background: transparent;
            transition: border-color 0.3s;
        }

        .contact-wrapper input:focus,
        .contact-wrapper textarea:focus {
            border-bottom: 1px solid #333;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Zen Old Mincho', serif;
            font-size: 1rem;
            letter-spacing: 0.2em;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: #555;
        }

        /* --- レスポンシブ --- */
        @media (max-width: 600px) {
            .profile-container { flex-direction: column; text-align: center; }
            .gallery { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
            .hero-section { background-attachment: scroll; }
            .contact-wrapper { padding: 30px 20px; }
        }
    </style>
</head>
