<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Gallery | Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- index.htmlと共通の基本スタイル --- */
        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            line-height: 1.8;
            background-color: #ffffff;
            color: #333;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #eee;
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }
        nav a {
            text-decoration: none;
            color: #666;
            font-weight: bold;
            font-family: 'Zen Old Mincho', serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        h2 {
            font-family: 'Zen Old Mincho', serif;
            text-align: center;
            margin: 60px 0 40px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        /* --- 桜ギャラリー専用スタイル（サイズ調整済み） --- */
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 80px;
        }

        .gallery-item {
            width: 100%;
            max-width: 800px; /* 少し大きめに調整 */
            margin-bottom: 40px;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            max-height: 85vh; /* 画面からはみ出さないよう調整 */
            object-fit: contain;
            display: block;
            border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* 軽く影をつけて作品を際立たせる */
        }

        .gallery-item p {
            font-family: 'Zen Old Mincho', serif;
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">← BACK TO TOP</a>
</nav>

<section>
    <h2>Sakura Gallery</h2>
    <div class="gallery">
        <div class="gallery-item">
            <img src="images/sakura/DSC_0209.JPG" alt="桜1">
            <p>DSC_0209</p>
        </div>
        <div class="gallery-item">
            <img src="images/sakura/DSC_0210.JPG" alt="桜2">
            <p>DSC_0210</p>
        </div>
    </div>
</section>

</body>
</html>
