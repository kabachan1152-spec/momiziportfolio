<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sakura Gallery</title>
    <link rel="stylesheet" href="style.css"> 
    
    <style>
    
    /* ギャラリー内の写真サイズを自動調整する */
.gallery-item img {
    width: 100%;       /* 横幅を親要素（枠）に合わせる */
    max-width: 600px;  /* 必要なら：写真が大きくなりすぎないよう上限を決める */
    height: auto;      /* 縦横比を維持して崩さない */
    display: block;
    margin: 20px auto; /* 写真を中央に寄せて、上下に余白を作る */
}

/* ギャラリー全体の並びを整える（1列にする場合） */
.gallery {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}
</style>
</head>
<body>
    <nav><a href="index.html">TOPへ戻る</a></nav>
    
    <section>
        <h2>Sakura Gallery</h2>
        <div class="gallery">
            <div class="gallery-item"><img src="DSC_0209.JPG" alt="桜1"></div>
            <div class="gallery-item"><img src="DSC_0210.JPG" alt="桜2"></div>
        </div>
    </section>
</body>
</html>
