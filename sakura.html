<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Gallery | Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 2. CSSでフォントを指定 */
        body {
            font-family: 'Noto Sans JP', sans-serif; /* 全体の基本フォント */
            margin: 0;
            line-height: 1.8;
            background-color: #ffffff;
            color: #333;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #eee;
            padding: 20px;
            text-align: center;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: #666;
            font-weight: bold;
            font-family: 'Zen Old Mincho', serif; /* 明朝体フォント */
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            transition: 0.3s;
        }

        nav a:hover {
            color: #000;
        }

        h2 {
            font-family: 'Zen Old Mincho', serif; /* タイトルを明朝体に */
            text-align: center;
            margin: 60px 0 40px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-size: 2rem;
        }

        /* ギャラリー部分のスタイル */
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 80px;
        }

        .gallery-item {
            width: 100%;
            max-width: 800px;
            margin-bottom: 60px;
            text-align: center;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            max-height: 85vh;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .gallery-item p {
            font-family: 'Zen Old Mincho', serif;
            font-size: 0.85rem;
            color: #888;
            margin-top: 15px;
            letter-spacing: 0.1em;
        }
        /* 最初はタイトルを隠しておく */
.image-title {
    font-family: 'Zen Old Mincho', serif;
    font-size: 0.9rem;
    color: #333;
    margin-top: 10px;
    text-align: center;
    
    opacity: 0;            /* 透明にする（隠す） */
    transition: 0.5s;      /* 0.5秒かけてふわっと表示させる */
    transform: translateY(10px); /* 少し下にずらしておく */
}

/* 画像の枠(gallery-item)にマウスが乗ったとき */
.gallery-item:hover .image-title {
    opacity: 1;            /* 表示する */
    transform: translateY(0);   /* 元の位置に戻る（下からスッと出る動き） */
}

/* ついでに画像自体も少し変化させるとオシャレです */
.gallery-item img {
    transition: 0.5s;
}

.gallery-item:hover img {
    transform: scale(1.02); /* わずかに大きくする */
    box-shadow: 0 8px 30px rgba(0,0,0,0.15); /* 影を強くする */
}
    </style>
</head>
<body>

<nav>
    <a href="index.html">← BACK TO TOP</a>
</nav>

<section>
    <h2>Sakura Gallery</h2>
    
    <div class="gallery">
        <div class="gallery-item"><img src="images/sakura/DSC_0016.JPG" alt="桜"><p class="image-title">SAKURA - 春の光</p></div>
        <div class="gallery-item"><img src="images/sakura/DSC_0026.JPG" alt="桜"></div>
        <div class="gallery-item"><img src="images/sakura/DSC_0044.JPG" alt="桜"></div>
        <div class="gallery-item"><img src="images/sakura/DSC_0045.JPG" alt="桜"></div>
        <div class="gallery-item"><img src="images/sakura/DSC_0048.JPG" alt="桜"></div>
        <div class="gallery-item"><img src="images/sakura/DSC_0050.JPG" alt="桜"></div>
        <div class="gallery-item"><img src="images/sakura/DSC_0055.JPG" alt="桜"></div>
        <div class="gallery-item"><img src="images/sakura/DSC_0066.JPG" alt="桜"></div>
        <div class="gallery-item"><img src="images/sakura/DSC_0069.JPG" alt="桜"></div>
    </div>
   </div>
</section>

</body>
</html>
